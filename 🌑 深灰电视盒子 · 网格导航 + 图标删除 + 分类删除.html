    <title>🌑 深灰电视盒子 · 网格导航 + 图标删除 + 分类删除</title>
    <style>
        /* ----- 全局样式：深灰色背景，玻璃卡片完全融入 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a1c20 0%, #26292e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e0e0e0;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px 40px 100px 40px;
            width: 100%;
        }

        /* ----- 搜索栏 ----- */
        .search-bar {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }
        .search-bar input {
            width: 60%;
            max-width: 600px;
            padding: 16px 32px;
            font-size: 1.2rem;
            border: none;
            background: rgba(45, 45, 50, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 60px;
            color: #f0f0f0;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            outline: none;
            transition: 0.2s;
        }
        .search-bar input:focus {
            border-color: #0a84ff;
            background: rgba(60, 60, 70, 0.8);
            box-shadow: 0 0 0 3px rgba(10,132,255,0.3);
        }
        .search-bar input::placeholder {
            color: #aaa;
            font-weight: 300;
        }

        /* ----- 分类区块 ----- */
        .category-section {
            margin-bottom: 60px;
            scroll-margin-top: 20px;
        }

        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-left: 10px;
        }
        .category-header h2 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            margin-right: 15px;
            letter-spacing: -0.5px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 40px;
            transition: background 0.2s;
            /* 可聚焦样式 */
            outline: none;
        }
        .category-header h2.focused {
            background: rgba(10, 132, 255, 0.3);
            box-shadow: 0 0 0 3px rgba(10,132,255,0.8);
        }
        .category-header h2:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .card-row {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 24px;
            padding: 10px 10px 25px 10px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
        }
        .card-row::-webkit-scrollbar {
            display: none;
        }

        .card {
            flex: 0 0 auto;
            width: 210px;
            height: 250px;
            background: rgba(35, 37, 42, 0.75);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.7);
            transition: transform 0.2s cubic-bezier(0.25,0.1,0.2,1.2), box-shadow 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 12px 16px 12px;
            cursor: pointer;
            position: relative;
            color: white;
            will-change: transform;
        }

        .card.focused {
            transform: scale(1.08);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 40px 50px -20px black, 0 0 0 3px rgba(255,255,255,0.3), 0 0 30px rgba(10,132,255,0.5);
            background: rgba(45, 48, 55, 0.85);
            z-index: 10;
        }

        .card-icon {
            width: 100%;
            height: 165px;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.6);
            border: none;
        }
        .card.focused .card-icon {
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.2) inset;
        }
        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-icon span {
            font-size: 5rem;
            line-height: 1;
            filter: drop-shadow(0 5px 8px #000);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 8px;
            color: #ffffff;
            text-shadow: none;
            letter-spacing: 0.3px;
            margin-top: 0;
            margin-bottom: 0;
        }

        .card-edit {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(20,20,25,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: #ddd;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s, transform 0.1s;
            backdrop-filter: blur(5px);
            z-index: 20;
        }
        .card:hover .card-edit,
        .card.focused .card-edit {
            opacity: 0.95;
        }
        .card-edit:hover {
            background: #0a84ff;
            border-color: #0a84ff;
            color: white;
            transform: scale(1.1);
        }

        .add-card {
            flex: 0 0 auto;
            width: 210px;
            height: 250px;
            background: rgba(45, 47, 52, 0.55);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border-radius: 32px;
            border: 2px dashed rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: rgba(255,255,255,0.7);
            transition: 0.2s;
            cursor: pointer;
            font-size: 3.5rem;
        }
        .add-card:hover {
            border-color: #0a84ff;
            color: #0a84ff;
            background: rgba(55, 58, 65, 0.7);
            transform: scale(1.03);
        }
        .add-card span {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .add-category-section {
            margin-top: 40px;
            display: flex;
            justify-content: center;
        }
        .add-category-button {
            width: 240px;
            height: 120px;
            background: rgba(45, 47, 52, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 48px;
            border: 2px dashed rgba(10,132,255,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #0a84ff;
            font-size: 4rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
        }
        .add-category-button:hover {
            background: rgba(60, 63, 70, 0.8);
            border-color: #0a84ff;
            transform: scale(1.03);
            color: #6ab0ff;
        }
        .add-category-button span {
            font-size: 1.2rem;
            font-weight: 500;
            margin-top: -10px;
        }

        /* 统一焦点样式 */
        .focused {
            outline: none;
        }
        .add-card.focused,
        .add-category-button.focused {
            box-shadow: 0 0 0 3px rgba(10,132,255,0.8);
            border-color: #0a84ff;
            background: rgba(60, 63, 70, 0.8);
            transform: scale(1.02);
        }
        #searchInput.focused {
            border-color: #0a84ff;
            background: rgba(60, 60, 70, 0.9);
            box-shadow: 0 0 0 3px rgba(10,132,255,0.3);
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: rgba(30, 32, 36, 0.9);
            backdrop-filter: blur(30px) saturate(180%);
            border-radius: 48px;
            padding: 35px 40px;
            width: 460px;
            max-width: 90%;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 50px 80px -20px rgba(0,0,0,0.8);
            color: #f0f0f0;
        }
        .modal-content h3 {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 30px;
            text-align: center;
            color: #0a84ff;
        }
        .modal-content input {
            width: 100%;
            padding: 16px 24px;
            margin-bottom: 20px;
            background: rgba(20, 22, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            font-size: 1rem;
            color: #fff;
            outline: none;
        }
        .modal-content input:focus {
            border-color: #0a84ff;
            background: rgba(30, 32, 38, 0.9);
            box-shadow: 0 0 0 3px rgba(10,132,255,0.3);
        }
        .modal-content input[type="file"] {
            padding: 12px;
            background: transparent;
            border: none;
        }
        .file-hint {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: -10px;
            margin-bottom: 15px;
        }
        /* 删除按钮 */
        .delete-btn {
            background: rgba(255, 80, 80, 0.2);
            border: 1px solid rgba(255, 80, 80, 0.5);
            color: #ffa0a0;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            margin-bottom: 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .delete-btn:hover {
            background: rgba(255, 80, 80, 0.4);
            border-color: #ff5e5e;
            color: white;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 25px;
        }
        .modal-buttons button {
            padding: 14px 34px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        .modal-buttons .save {
            background: #0a84ff;
            color: white;
            box-shadow: 0 10px 20px -5px #0a84ff80;
        }
        .modal-buttons .save:hover {
            background: #0063ce;
            transform: scale(1.02);
        }
        .modal-buttons .cancel {
            background: #3a3a44;
            color: #ddd;
        }
        .modal-buttons .cancel:hover {
            background: #50505a;
        }

        .key-hint {
            position: fixed;
            bottom: 20px;
            right: 30px;
            background: rgba(30,30,35,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 50;
        }
    </style>
</head>

<script>
    (function() {
        // 音效系统
        let audioContext = null;
        function playFocusSound() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => createAndPlaySound()).catch(() => {});
                } else {
                    createAndPlaySound();
                }
            } catch (e) {}
        }
        function createAndPlaySound() {
            if (!audioContext) return;
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = 420;
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start(now);
            osc.stop(now + 0.08);
        }

        // 分类数据
        let categories = [
            { id: 'live', name: '直播电视台', items: [] },
            { id: 'free', name: '免费视频网站', items: [] },
            { id: 'paid', name: '收费视频网站', items: [] }
        ];

        // 示例数据
        categories[0].items = [
            { id: 'c1', title: 'CCTV-1', url: 'https://tv.cctv.com/live/cctv1', iconData: '' },
            { id: 'c2', title: '东方卫视', url: 'https://www.kankanews.com/', iconData: '' },
            { id: 'c3', title: '湖南卫视', url: 'https://www.mgtv.com/', iconData: '' }
        ];
        categories[1].items = [
            { id: 'f1', title: 'Bilibili', url: 'https://bilibili.com', iconData: '' },
            { id: 'f2', title: 'YouTube', url: 'https://youtube.com', iconData: '' },
            { id: 'f3', title: '抖音', url: 'https://douyin.com', iconData: '' }
        ];
        categories[2].items = [
            { id: 'p1', title: 'Netflix', url: 'https://netflix.com', iconData: '' },
            { id: 'p2', title: 'Disney+', url: 'https://disneyplus.com', iconData: '' }
        ];

        let searchTerm = '';
        let editingContext = { type: null, catId: null, itemId: null };

        const container = document.getElementById('categoriesContainer');
        const modal = document.getElementById('editModal');
        const modalTitle = document.getElementById('modalTitle');
        const editTitle = document.getElementById('editTitle');
        const editUrl = document.getElementById('editUrl');
        const editIcon = document.getElementById('editIcon');
        const deleteIconBtn = document.getElementById('deleteIconBtn');
        const deleteCategoryBtn = document.getElementById('deleteCategoryBtn');
        const modalSave = document.getElementById('modalSave');
        const modalCancel = document.getElementById('modalCancel');
        const addCategoryBtn = document.getElementById('addCategoryBtn');

        function loadFromStorage() {
            const stored = localStorage.getItem('tvBoxCategories');
            if (stored) {
                try { categories = JSON.parse(stored); } catch(e) {}
            }
        }
        function saveToStorage() {
            localStorage.setItem('tvBoxCategories', JSON.stringify(categories));
        }
        loadFromStorage();

        function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 9); }

        function getFilteredItemsForCat(catId) {
            const cat = categories.find(c => c.id === catId);
            if (!cat) return [];
            if (!searchTerm) return cat.items;
            const lower = searchTerm.toLowerCase();
            return cat.items.filter(i => i.title.toLowerCase().includes(lower));
        }

        // ---------- 网格焦点管理 (按列优先) ----------
        let grid = [];                // 二维数组 grid[row][col] = 元素
        let currentRow = 0;
        let currentCol = 0;

        // 构建网格 (每次渲染后调用)
        function buildGrid() {
            grid = [];
            // 第0行：搜索框
            const searchInput = document.getElementById('searchInput');
            if (searchInput) grid.push([searchInput]);

            // 遍历分类
            document.querySelectorAll('.category-section').forEach((section, catIdx) => {
                // 分类标题作为单独一行
                const titleEl = section.querySelector('h2');
                if (titleEl) {
                    grid.push([titleEl]);
                }

                // 卡片行：收集该分类下所有卡片和添加卡片
                const cards = Array.from(section.querySelectorAll('.card'));
                const addCard = section.querySelector('.add-card');
                const cardRowElements = [...cards];
                if (addCard) cardRowElements.push(addCard);
                if (cardRowElements.length > 0) {
                    grid.push(cardRowElements);
                }
            });

            // 最后一行: 底部添加主标题按钮
            const bottomBtn = document.getElementById('addCategoryBtn');
            if (bottomBtn) grid.push([bottomBtn]);

            // 确保当前行列有效
            if (grid.length === 0) return;
            if (currentRow >= grid.length) currentRow = grid.length - 1;
            if (grid[currentRow].length === 0) {
                // 如果当前行无元素，尝试向上找有元素的行
                for (let r = currentRow; r >= 0; r--) {
                    if (grid[r].length > 0) {
                        currentRow = r;
                        break;
                    }
                }
            }
            if (currentCol >= grid[currentRow].length) currentCol = grid[currentRow].length - 1;
            if (currentCol < 0) currentCol = 0;
        }

        // 设置焦点到指定行列
        function setFocus(row, col, options = { scroll: true, playSound: true }) {
            if (grid.length === 0) return;
            // 边界检查
            row = Math.max(0, Math.min(grid.length - 1, row));
            if (grid[row].length === 0) {
                // 如果该行无元素，尝试向下/向上找最近有元素的行
                let found = false;
                for (let r = row; r < grid.length; r++) {
                    if (grid[r].length > 0) { row = r; found = true; break; }
                }
                if (!found) {
                    for (let r = row; r >= 0; r--) {
                        if (grid[r].length > 0) { row = r; found = true; break; }
                    }
                }
                if (!found) return;
            }
            col = Math.max(0, Math.min(grid[row].length - 1, col));

            // 移除所有focused类
            document.querySelectorAll('.focused').forEach(el => el.classList.remove('focused'));

            const target = grid[row][col];
            if (!target) return;

            target.classList.add('focused');
            target.focus({ preventScroll: true });

            // 记录焦点信息用于恢复
            currentRow = row;
            currentCol = col;

            if (options.scroll) {
                // 如果是卡片，使用原有的横向滚动逻辑
                if (target.classList.contains('card')) {
                    const rowEl = target.closest('.card-row');
                    if (rowEl) {
                        const cardLeft = target.offsetLeft;
                        const cardWidth = target.offsetWidth;
                        const rowWidth = rowEl.clientWidth;
                        const scrollLeft = cardLeft - (rowWidth / 2) + (cardWidth / 2);
                        rowEl.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                    } else {
                        target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
                    }
                } else {
                    target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
                }
            }

            if (options.playSound) {
                playFocusSound();
            }
        }

        // 移动焦点
        function moveFocus(direction) {
            if (grid.length === 0) return;
            let newRow = currentRow;
            let newCol = currentCol;

            switch (direction) {
                case 'up':
                    newRow--;
                    break;
                case 'down':
                    newRow++;
                    break;
                case 'left':
                    newCol--;
                    break;
                case 'right':
                    newCol++;
                    break;
            }

            // 边界限制
            newRow = Math.max(0, Math.min(grid.length - 1, newRow));
            // 如果新行没有元素，尝试调整
            if (grid[newRow].length === 0) {
                // 上下移动时，如果目标行无元素，则寻找最近的有元素行
                if (direction === 'up' || direction === 'down') {
                    let step = direction === 'up' ? -1 : 1;
                    let r = newRow;
                    while (r >= 0 && r < grid.length && grid[r].length === 0) {
                        r += step;
                    }
                    if (r >= 0 && r < grid.length && grid[r].length > 0) {
                        newRow = r;
                    } else {
                        return; // 无法移动
                    }
                } else {
                    return; // 左右移动时行内无元素，不移动
                }
            }

            // 列边界处理：如果新列超出当前行范围，尝试找最近的有效列
            if (newCol >= grid[newRow].length) newCol = grid[newRow].length - 1;
            if (newCol < 0) newCol = 0;

            if (newRow !== currentRow || newCol !== currentCol) {
                setFocus(newRow, newCol, { scroll: true, playSound: true });
            }
        }

        // 恢复焦点（基于上次的row,col，尽量保留）
        function restoreFocus() {
            buildGrid();
            if (grid.length === 0) return;
            // 如果当前行列有效，则直接设置；否则重置到0,0
            let row = currentRow, col = currentCol;
            if (row >= grid.length || (grid[row] && col >= grid[row].length)) {
                row = 0;
                col = 0;
                // 找到第一个有元素的行
                for (let r = 0; r < grid.length; r++) {
                    if (grid[r].length > 0) { row = r; break; }
                }
            }
            setFocus(row, col, { scroll: true, playSound: false });
        }

        // 渲染
        function render() {
            let html = '';
            categories.forEach((cat, catIdx) => {
                const filteredItems = getFilteredItemsForCat(cat.id);
                html += `<section class="category-section" data-cat-id="${cat.id}" data-cat-index="${catIdx}">`;
                html += `<div class="category-header">`;
                html += `<h2 tabindex="-1" data-cat-edit="${cat.id}">${cat.name}</h2>`;
                // 移除铅笔图标
                html += `</div>`;
                html += `<div class="card-row">`;

                filteredItems.forEach((item, idx) => {
                    html += `<div class="card" data-cat-idx="${catIdx}" data-item-idx="${idx}" data-item-id="${item.id}" data-url="${item.url}" data-title="${item.title}">`;
                    html += `<div class="card-icon">`;
                    if (item.iconData && item.iconData.startsWith('data:image')) {
                        html += `<img src="${item.iconData}" alt="icon">`;
                    } else {
                        let emoji = '📺';
                        if (cat.id === 'free') emoji = '🎞️';
                        if (cat.id === 'paid') emoji = '💎';
                        html += `<span>${emoji}</span>`;
                    }
                    html += `</div>`;
                    html += `<div class="card-title">${item.title}</div>`;
                    html += `<div class="card-edit" data-item-edit="${item.id}" title="编辑卡片">✏️</div>`;
                    html += `</div>`;
                });

                html += `<div class="add-card" data-cat-add="${cat.id}" title="添加新卡片">`;
                html += `<div>➕</div><span>添加</span>`;
                html += `</div>`;

                html += `</div></section>`;
            });
            container.innerHTML = html;

            // 重建网格并恢复焦点
            restoreFocus();
        }

        // 查找卡片项
        function findItemById(itemId) {
            for (let cat of categories) {
                const item = cat.items.find(i => i.id === itemId);
                if (item) return item;
            }
            return null;
        }

        // 显示模态框
        function showModal(context) {
            editingContext = context;
            editIcon.value = '';

            // 隐藏所有专用删除按钮
            deleteIconBtn.style.display = 'none';
            deleteCategoryBtn.style.display = 'none';

            if (context.type === 'item') {
                modalTitle.innerText = '编辑卡片';
                const item = findItemById(context.itemId);
                if (item) {
                    editTitle.value = item.title || '';
                    editUrl.value = item.url || '';
                    if (item.iconData && item.iconData.startsWith('data:image')) {
                        deleteIconBtn.style.display = 'block';
                    }
                }
                editUrl.style.display = 'block';
                document.querySelector('.file-hint').style.display = 'block';
                editIcon.style.display = 'block';
            } else if (context.type === 'add') {
                modalTitle.innerText = '添加新卡片';
                editTitle.value = '';
                editUrl.value = '';
                editUrl.style.display = 'block';
                document.querySelector('.file-hint').style.display = 'block';
                editIcon.style.display = 'block';
            } else if (context.type === 'cat') {
                modalTitle.innerText = '编辑分类';
                const cat = categories.find(c => c.id === context.catId);
                editTitle.value = cat ? cat.name : '';
                editUrl.style.display = 'none';
                document.querySelector('.file-hint').style.display = 'none';
                editIcon.style.display = 'none';
                // 显示删除分类按钮
                deleteCategoryBtn.style.display = 'block';
            } else if (context.type === 'newcat') {
                modalTitle.innerText = '新建主标题';
                editTitle.value = '';
                editUrl.style.display = 'none';
                document.querySelector('.file-hint').style.display = 'none';
                editIcon.style.display = 'none';
            }
            modal.classList.add('active');
            // 焦点移到标题输入框
            setTimeout(() => editTitle.focus(), 50);
        }

        function hideModal() {
            modal.classList.remove('active');
            editingContext = {};
            // 关闭后恢复焦点到之前的位置
            restoreFocus();
        }

        function saveModal() {
            const { type, catId, itemId } = editingContext;
            const newTitle = editTitle.value.trim();
            const newUrl = editUrl.value.trim();
            const file = editIcon.files[0];

            // 处理新建分类
            if (type === 'newcat') {
                if (newTitle) {
                    const newCat = {
                        id: genId(),
                        name: newTitle,
                        items: []
                    };
                    categories.push(newCat);
                }
                hideModal();
                render();
                saveToStorage();
                return;
            }

            if (type === 'cat') {
                if (newTitle) {
                    const cat = categories.find(c => c.id === catId);
                    if (cat) cat.name = newTitle;
                }
                hideModal();
                render();
                saveToStorage();
                return;
            }

            // 卡片编辑或添加
            if (type === 'item') {
                const item = findItemById(itemId);
                if (item) {
                    item.title = newTitle;
                    item.url = newUrl;
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            item.iconData = e.target.result;
                            hideModal();
                            render();
                            saveToStorage();
                        };
                        reader.readAsDataURL(file);
                        return;
                    }
                }
            } else if (type === 'add') {
                const cat = categories.find(c => c.id === catId);
                if (cat && newTitle && newUrl) {
                    const newItem = {
                        id: genId(),
                        title: newTitle,
                        url: newUrl,
                        iconData: ''
                    };
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            newItem.iconData = e.target.result;
                            cat.items.push(newItem);
                            hideModal();
                            render();
                            saveToStorage();
                        };
                        reader.readAsDataURL(file);
                        return;
                    } else {
                        cat.items.push(newItem);
                    }
                }
            }

            hideModal();
            render();
            saveToStorage();
        }

        // 删除卡片图标
        function deleteCurrentIcon() {
            if (editingContext.type === 'item') {
                const item = findItemById(editingContext.itemId);
                if (item) {
                    item.iconData = '';
                    deleteIconBtn.style.display = 'none';
                }
            }
        }

        // 删除分类
        function deleteCurrentCategory() {
            if (editingContext.type === 'cat') {
                const catId = editingContext.catId;
                const index = categories.findIndex(c => c.id === catId);
                if (index !== -1) {
                    if (confirm(`确定要删除分类“${categories[index].name}”及其所有卡片吗？`)) {
                        categories.splice(index, 1);
                        hideModal();
                        render();
                        saveToStorage();
                    }
                }
            }
        }

        // 事件监听
        document.addEventListener('click', (e) => {
            // 点击分类标题
            if (e.target.closest('h2[data-cat-edit]')) {
                const h2 = e.target.closest('h2[data-cat-edit]');
                const catId = h2.dataset.catEdit;
                showModal({ type: 'cat', catId });
                return;
            }
            if (e.target.closest('.card-edit')) {
                e.stopPropagation();
                const btn = e.target.closest('.card-edit');
                const itemId = btn.dataset.itemEdit;
                showModal({ type: 'item', itemId });
                return;
            }
            if (e.target.closest('.add-card')) {
                const addBtn = e.target.closest('.add-card');
                const catId = addBtn.dataset.catAdd;
                showModal({ type: 'add', catId });
                return;
            }
            if (e.target.closest('#addCategoryBtn')) {
                showModal({ type: 'newcat' });
                return;
            }
            // 卡片打开链接
            const card = e.target.closest('.card');
            if (card && !e.target.closest('.card-edit')) {
                const url = card.dataset.url;
                if (url) window.open(url, '_blank');
                const itemId = card.dataset.itemId;
                if (itemId) {
                    for (let r = 0; r < grid.length; r++) {
                        for (let c = 0; c < grid[r].length; c++) {
                            if (grid[r][c] === card) {
                                currentRow = r;
                                currentCol = c;
                                break;
                            }
                        }
                    }
                }
            }
            // 删除图标按钮
            if (e.target.closest('#deleteIconBtn')) {
                deleteCurrentIcon();
            }
            // 删除分类按钮
            if (e.target.closest('#deleteCategoryBtn')) {
                deleteCurrentCategory();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (modal.classList.contains('active')) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    saveModal();
                } else if (e.key === 'Escape') {
                    hideModal();
                }
                return;
            }

            const key = e.key;
            if (key.startsWith('Arrow')) {
                e.preventDefault();
                const dir = key.slice(5).toLowerCase();
                moveFocus(dir);
            } else if (key === 'Enter') {
                e.preventDefault();
                const focusedEl = document.querySelector('.focused');
                if (!focusedEl) return;

                if (focusedEl.id === 'searchInput') {
                    // 搜索框不执行操作
                } else if (focusedEl.classList.contains('card')) {
                    const url = focusedEl.dataset.url;
                    if (url) window.open(url, '_blank');
                } else if (focusedEl.classList.contains('add-card')) {
                    focusedEl.click();
                } else if (focusedEl.tagName === 'H2' && focusedEl.hasAttribute('data-cat-edit')) {
                    focusedEl.click();
                } else if (focusedEl.id === 'addCategoryBtn') {
                    focusedEl.click();
                }
            }
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            render();
        });

        modalSave.addEventListener('click', saveModal);
        modalCancel.addEventListener('click', hideModal);

        // 初始化
        render();
        window.addEventListener('beforeunload', saveToStorage);
    })();
</script>

</body></html>
